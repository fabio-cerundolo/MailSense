<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MailSense — Automazione Email per PMI</title>
    <meta name="description" content="MailSense: genera e invia email intelligenti per la tua PMI con un click.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Space Grotesk', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0a0a0f',
                        panel: '#12121a',
                        border: '#1f1f2e',
                        accent: '#7c5cff',
                        accent2: '#00e0b8',
                    }
                }
            }
        }
    </script>
    <style>
        html, body { height: 100%; }
        body {
            background-color: #0a0a0f;
            color: #e7e7ee;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .aurora {
            position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
        }
        .aurora::before, .aurora::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            transform: translateZ(0); backface-visibility: hidden;
        }
        .aurora::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,92,255,0.3), transparent 70%);
            top: -10%; left: -10%;
            animation: float 15s ease-in-out infinite alternate;
        }
        .aurora::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,224,184,0.2), transparent 70%);
            bottom: -10%; right: -10%;
            animation: float 18s ease-in-out infinite alternate-reverse;
        }
        @keyframes float {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        .glass {
            background: rgba(18, 18, 26, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .grad-text {
            background: linear-gradient(135deg, #7c5cff 0%, #00e0b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .field-input {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid #1f1f2e;
            color: #e7e7ee;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        .field-input::placeholder { color: rgba(231, 231, 238, 0.35); }
        .field-input:focus {
            outline: none;
            border-color: rgba(124, 92, 255, 0.6);
            background: rgba(10, 10, 15, 0.9);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.15);
        }

        .btn-submit {
            background: linear-gradient(135deg, #7c5cff, #5b8cff);
            box-shadow: 0 10px 30px -10px rgba(124,92,255,0.6);
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px -10px rgba(124,92,255,0.8);
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .reveal {
            opacity: 0; transform: translateY(20px);
            animation: reveal 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
        }
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }

        /* Preview Section Styles */
        .preview-card {
            border-left: 3px solid #00e0b8;
            background: rgba(0, 224, 184, 0.03);
        }
        .email-body {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.7;
        }

        @media (prefers-reduced-motion: reduce) {
            .aurora::before, .aurora::after { animation: none; }
            .reveal { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body class="antialiased selection:bg-accent selection:text-white">

    <div class="aurora"></div>

    <main class="min-h-screen flex items-center justify-center px-4 py-12 sm:py-16">
        <div class="w-full max-w-2xl">

            <!-- Header -->
            <header class="text-center mb-8 reveal">
                <div class="inline-flex items-center gap-2 mb-5">
                    <span class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-accent2 grid place-items-center text-bg font-display font-bold text-lg">M</span>
                    <span class="font-display font-bold text-xl">MailSense</span>
                </div>
                <h1 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold leading-tight mb-3">
                    Automazione Email <br class="hidden sm:block"/>
                    <span class="grad-text">per la tua PMI</span>
                </h1>
                <p class="text-white/60 text-sm sm:text-base max-w-md mx-auto">
                    Compila i campi: MailSense genererà un'email professionale e personalizzata basata sul contesto fornito.
                </p>
            </header>

            <!-- Form card -->
            <div class="glass rounded-2xl p-6 sm:p-8 reveal" style="animation-delay: 150ms;">
                <form id="emailForm" class="space-y-5">
                    <div>
                        <label for="recipient" class="block text-sm font-medium text-white/80 mb-2">Destinatario</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </span>
                            <input type="text" id="recipient" name="recipient" placeholder="mario.rossi@azienda.it" required class="field-input w-full pl-11 pr-4 py-3 rounded-lg text-sm"/>
                        </div>
                    </div>

                    <div>
                        <label for="subject" class="block text-sm font-medium text-white/80 mb-2">Oggetto</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                            </span>
                            <input type="text" id="subject" name="subject" placeholder="Es. Proposta di collaborazione" required class="field-input w-full pl-11 pr-4 py-3 rounded-lg text-sm"/>
                        </div>
                    </div>

                    <div>
                        <label for="context" class="block text-sm font-medium text-white/80 mb-2">Contesto dell'email</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-3.5 text-white/40 pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
                            </span>
                            <textarea id="context" name="context" rows="4" placeholder="Descrivi il contenuto, il tono e le informazioni chiave da includere..." required class="field-input w-full pl-11 pr-4 py-3 rounded-lg text-sm resize-y min-h-[100px]"></textarea>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-submit w-full py-3.5 rounded-xl text-white font-semibold text-sm inline-flex items-center justify-center gap-2">
                        <span id="btnText" class="inline-flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            Genera Email
                        </span>
                        <span id="btnLoading" class="hidden inline-flex items-center gap-2">
                            <span class="spinner"></span>
                            Generazione in corso...
                        </span>
                    </button>
                </form>

                <!-- Error Message Container -->
                <div id="errorMessage" class="hidden mt-4 p-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-start gap-3">
                    <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span id="errorText"></span>
                </div>
            </div>

            <!-- Preview Section (Hidden by default) -->
            <div id="previewSection" class="hidden mt-6 reveal" style="animation-delay: 100ms;">
                <div class="glass rounded-2xl p-6 sm:p-8 preview-card">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-display font-bold text-lg flex items-center gap-2">
                            <svg class="w-5 h-5 text-accent2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            Email Generata
                        </h3>
                        <button id="copyBtn" class="text-xs font-medium px-3 py-1.5 rounded-lg bg-white/5 border border-border hover:bg-white/10 hover:border-accent transition flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                            <span id="copyText">Copia</span>
                        </button>
                    </div>
                    
                    <div class="mb-4 space-y-2 text-sm">
                        <div class="flex gap-2">
                            <span class="text-white/40 w-16 flex-shrink-0">A:</span>
                            <span id="previewRecipient" class="text-white/90 font-medium"></span>
                        </div>
                        <div class="flex gap-2">
                            <span class="text-white/40 w-16 flex-shrink-0">Oggetto:</span>
                            <span id="previewSubject" class="text-white/90 font-medium"></span>
                        </div>
                    </div>

                    <div class="border-t border-border pt-4 mb-6">
                        <p id="previewBody" class="email-body text-white/80 text-sm"></p>
                    </div>

                    <button id="resetBtn" class="w-full py-3 rounded-xl border border-border bg-white/5 font-semibold text-sm hover:bg-white/10 hover:border-accent transition flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Genera un'altra email
                    </button>
                </div>
            </div>

            <p class="text-center text-xs text-white/30 mt-8 reveal" style="animation-delay: 300ms;">
                Le email vengono generate in modo sicuro tramite intelligenza artificiale.
            </p>
        </div>
    </main>

    <script>
        const form = document.getElementById("emailForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const btnLoading = document.getElementById("btnLoading");
        const errorMessage = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        
        const previewSection = document.getElementById("previewSection");
        const previewRecipient = document.getElementById("previewRecipient");
        const previewSubject = document.getElementById("previewSubject");
        const previewBody = document.getElementById("previewBody");
        const copyBtn = document.getElementById("copyBtn");
        const copyText = document.getElementById("copyText");
        const resetBtn = document.getElementById("resetBtn");

        form.onsubmit = async function (event) {
            event.preventDefault();
            
            // Reset UI state
            errorMessage.classList.add("hidden");
            previewSection.classList.add("hidden");
            
            // Loading state
            submitBtn.disabled = true;
            btnText.classList.add("hidden");
            btnLoading.classList.remove("hidden");

            const formData = {
                recipient: document.getElementById("recipient").value,
                subject: document.getElementById("subject").value,
                context: document.getElementById("context").value
            };

            try {
                const response = await fetch('/send-email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.status || "Errore durante la generazione");
                }

                // Populate preview
                previewRecipient.textContent = formData.recipient;
                previewSubject.textContent = formData.subject || "Nessun oggetto";
                previewBody.textContent = result.generated_content || result.status; // Fallback se il backend manda solo status
                
                // Show preview
                previewSection.classList.remove("hidden");
                
                // Scroll to preview on mobile
                if (window.innerWidth < 640) {
                    previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

            } catch (error) {
                errorText.textContent = error.message;
                errorMessage.classList.remove("hidden");
            } finally {
                submitBtn.disabled = false;
                btnText.classList.remove("hidden");
                btnLoading.classList.add("hidden");
            }
        };

        // Copy to clipboard functionality
        copyBtn.addEventListener("click", () => {
            const textToCopy = previewBody.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyText.textContent;
                copyText.textContent = "Copiato!";
                copyBtn.classList.add("border-accent2", "text-accent2");
                setTimeout(() => {
                    copyText.textContent = originalText;
                    copyBtn.classList.remove("border-accent2", "text-accent2");
                }, 2000);
            });
        });

        // Reset form functionality
        resetBtn.addEventListener("click", () => {
            form.reset();
            previewSection.classList.add("hidden");
            errorMessage.classList.add("hidden");
            document.getElementById("recipient").focus();
        });
    </script>
</body>
</html>
