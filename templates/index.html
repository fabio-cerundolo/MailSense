<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MailSense — Automazione Email per PMI</title>
    <meta name="description" content="MailSense: genera e invia email intelligenti per la tua PMI con un click.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Space Grotesk', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0a0a0f',
                        panel: '#12121a',
                        border: '#1f1f2e',
                        accent: '#7c5cff',
                        accent2: '#00e0b8',
                    }
                }
            }
        }
    </script>
    <style>
        html, body { height: 100%; }
        body {
            background-color: #0a0a0f;
            color: #e7e7ee;
            font-family: 'Inter', system-ui, sans-serif;
        }

        /* Aurora background (senza flicker) */
        .aurora {
            position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
        }
        .aurora::before, .aurora::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            transform: translateZ(0); backface-visibility: hidden;
        }
        .aurora::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,92,255,0.3), transparent 70%);
            top: -10%; left: -10%;
            animation: float 15s ease-in-out infinite alternate;
        }
        .aurora::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,224,184,0.2), transparent 70%);
            bottom: -10%; right: -10%;
            animation: float 18s ease-in-out infinite alternate-reverse;
        }
        @keyframes float {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        /* Glass card */
        .glass {
            background: rgba(18, 18, 26, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .grad-text {
            background: linear-gradient(135deg, #7c5cff 0%, #00e0b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Input styling */
        .field-input {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid #1f1f2e;
            color: #e7e7ee;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        .field-input::placeholder { color: rgba(231, 231, 238, 0.35); }
        .field-input:focus {
            outline: none;
            border-color: rgba(124, 92, 255, 0.6);
            background: rgba(10, 10, 15, 0.9);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.15);
        }

        /* Submit button */
        .btn-submit {
            background: linear-gradient(135deg, #7c5cff, #5b8cff);
            box-shadow: 0 10px 30px -10px rgba(124,92,255,0.6);
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px -10px rgba(124,92,255,0.8);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Reveal animation */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 0.8s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
        }
        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .aurora::before, .aurora::after { animation: none; }
            .reveal { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body class="antialiased selection:bg-accent selection:text-white">

    <div class="aurora"></div>

    <main class="min-h-screen flex items-center justify-center px-4 py-12 sm:py-16">
        <div class="w-full max-w-xl">

            <!-- Header -->
            <header class="text-center mb-8 reveal">
                <div class="inline-flex items-center gap-2 mb-5">
                    <span class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-accent2 grid place-items-center text-bg font-display font-bold text-lg">M</span>
                    <span class="font-display font-bold text-xl">MailSense</span>
                </div>
                <h1 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold leading-tight mb-3">
                    Automazione Email <br class="hidden sm:block"/>
                    <span class="grad-text">per la tua PMI</span>
                </h1>
                <p class="text-white/60 text-sm sm:text-base max-w-md mx-auto">
                    Compila i campi: MailSense genererà e invierà un'email personalizzata basata sul contesto che hai fornito.
                </p>
            </header>

            <!-- Form card -->
            <div class="glass rounded-2xl p-6 sm:p-8 reveal" style="animation-delay: 150ms;">
                <form id="emailForm" class="space-y-5">

                    <!-- Destinatario -->
                    <div>
                        <label for="recipient" class="block text-sm font-medium text-white/80 mb-2">
                            Destinatario
                        </label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                            </span>
                            <input
                                type="text"
                                id="recipient"
                                name="recipient"
                                placeholder="mario.rossi@azienda.it"
                                required
                                class="field-input w-full pl-11 pr-4 py-3 rounded-lg text-sm"
                            />
                        </div>
                    </div>

                    <!-- Oggetto -->
                    <div>
                        <label for="subject" class="block text-sm font-medium text-white/80 mb-2">
                            Oggetto
                        </label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                                </svg>
                            </span>
                            <input
                                type="text"
                                id="subject"
                                name="subject"
                                placeholder="Es. Proposta di collaborazione"
                                required
                                class="field-input w-full pl-11 pr-4 py-3 rounded-lg text-sm"
                            />
                        </div>
                    </div>

                    <!-- Contesto -->
                    <div>
                        <label for="context" class="block text-sm font-medium text-white/80 mb-2">
                            Contesto dell'email
                        </label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-3.5 text-white/40 pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
                                </svg>
                            </span>
                            <textarea
                                id="context"
                                name="context"
                                rows="5"
                                placeholder="Descriivi il contenuto, il tono e le informazioni chiave da includere nell'email..."
                                required
                                class="field-input w-full pl-11 pr-4 py-3 rounded-lg text-sm resize-y min-h-[120px]"
                            ></textarea>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button
                        type="submit"
                        id="submitBtn"
                        class="btn-submit w-full py-3.5 rounded-xl text-white font-semibold text-sm inline-flex items-center justify-center gap-2"
                    >
                        <span id="btnText" class="inline-flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                            </svg>
                            Invia Email
                        </span>
                        <span id="btnLoading" class="hidden inline-flex items-center gap-2">
                            <span class="spinner"></span>
                            Invio in corso...
                        </span>
                    </button>
                </form>
            </div>

            <!-- Footer hint -->
            <p class="text-center text-xs text-white/30 mt-6 reveal" style="animation-delay: 300ms;">
                Le email vengono generate e inviate in modo sicuro tramite il backend MailSense.
            </p>
        </div>
    </main>

    <script>
        document.getElementById("emailForm").onsubmit = async function (event) {
            event.preventDefault();

            const btn = document.getElementById("submitBtn");
            const btnText = document.getElementById("btnText");
            const btnLoading = document.getElementById("btnLoading");

            // Stato "loading" (solo visivo, la logica non cambia)
            btn.disabled = true;
            btnText.classList.add("hidden");
            btnLoading.classList.remove("hidden");

            try {
                const response = await fetch('/send-email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        recipient: document.getElementById("recipient").value,
                        subject: document.getElementById("subject").value,
                        context: document.getElementById("context").value
                    })
                });
                const result = await response.json();
                alert(result.status);
            } catch (error) {
                alert("Errore di comunicazione con il server. Riprova più tardi.");
            } finally {
                // Ripristina stato pulsante
                btn.disabled = false;
                btnText.classList.remove("hidden");
                btnLoading.classList.add("hidden");
            }
        };
    </script>
</body>
</html>
