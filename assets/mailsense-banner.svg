<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="120">
  <!-- Sfondo perfettamente allineato al pannello scuro dell'app -->
  <rect width="450" height="120" rx="16" fill="#12121a" stroke="#1f1f2e" stroke-width="1.5"/>
  
  <!-- Effetti di luce soffusa sui lati (Stile Aurora) -->
  <circle cx="40" cy="30" r="65" fill="#7c5cff" opacity="0.12" filter="blur(28px)" />
  <circle cx="410" cy="90" r="55" fill="#00e0b8" opacity="0.1" filter="blur(22px)" />

  <g transform="translate(30, 35)">
    <!-- Icona Busta + AI Core -->
    <path d="M8 12C8 10.3431 9.34315 9 11 9H37C38.6569 9 40 10.3431 40 12V32C40 33.6569 38.6569 35 37 35H11C9.34315 35 8 33.6569 8 32V12Z" 
          stroke="url(#bannerGrad)" 
          stroke-width="4" 
          stroke-linejoin="round"
          fill="none" />
    <path d="M8 13L21.3205 21.8803C22.9515 22.9677 25.0485 22.9677 26.6795 21.8803L40 13" 
          stroke="url(#bannerGrad)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    
    <!-- Scintilla Ingegneria AI -->
    <path d="M31 22L32.5 25L35.5 26.5L32.5 28L31 31L29.5 28L26.5 26.5L29.5 25L31 22Z" fill="#00e0b8"/>
    
    <defs>
      <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7c5cff" />
        <stop offset="100%" stop-color="#00e0b8" />
      </linearGradient>
    </defs>
    
    <!-- Testo con lo Space Grotesk/Inter della landing page -->
    <text x="60" y="28" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
      Mail<tspan fill="#00e0b8">Sense</tspan>
    </text>
    
    <!-- Sottotitolo tecnico -->
    <text x="62" y="44" font-family="'Inter', system-ui, sans-serif" font-size="9.5" font-weight="600" fill="#7c5cff" letter-spacing="2.8">
      AI-POWERED INBOX INTELLIGENCE
    </text>
  </g>
</svg>
